# =============================================================================
# docker-compose.yml — Development (Infrastructure only)
#
# Run Laravel locally:
#   php artisan serve
#   npm run dev
#
# Usage:
#   Dev  : docker compose up -d
#   Prod : docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# Services:
#   postgres  — Database (exposed on localhost:5432)
#   redis     — Cache, session, queue (exposed on localhost:6379)
#   queue     — Laravel Horizon (dashboard + workers)
#   scheduler — Task scheduler
#   pail      — Log tailing (php artisan pail)
# =============================================================================

services:
    # ---------------------------------------------------------------------------
    # PostgreSQL 16
    # ---------------------------------------------------------------------------
    postgres:
        image: postgres:16-alpine
        container_name: ${COMPOSE_PROJECT_NAME:-laravel}_postgres
        restart: unless-stopped
        ports:
            - "${DB_PORT:-5432}:5432"
        environment:
            POSTGRES_DB: ${DB_DATABASE:-laravel}
            POSTGRES_USER: ${DB_USERNAME:-laravel}
            POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
        volumes:
            - postgres_data:/var/lib/postgresql/data
            - ./docker/postgres/postgresql.conf:/etc/postgresql/postgresql.conf:ro
        command: postgres -c config_file=/etc/postgresql/postgresql.conf
        networks:
            - internal
        healthcheck:
            test:
                [
                    "CMD-SHELL",
                    "pg_isready -U ${DB_USERNAME:-laravel} -d ${DB_DATABASE:-laravel}",
                ]
            interval: 10s
            timeout: 5s
            retries: 5
            start_period: 30s
        deploy:
            resources:
                limits:
                    memory: 512M

    # ---------------------------------------------------------------------------
    # Redis 7
    # ---------------------------------------------------------------------------
    redis:
        image: redis:7-alpine
        container_name: ${COMPOSE_PROJECT_NAME:-laravel}_redis
        restart: unless-stopped
        ports:
            - "${REDIS_PORT:-6379}:6379"
        command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
        volumes:
            - redis_data:/data
        networks:
            - internal
        healthcheck:
            test: ["CMD", "redis-cli", "ping"]
            interval: 10s
            timeout: 3s
            retries: 3

# =============================================================================
# Volumes
# =============================================================================
volumes:
    postgres_data:
        driver: local
    redis_data:
        driver: local
    app_storage:
        driver: local

# =============================================================================
# Networks
# =============================================================================
networks:
    internal:
        driver: bridge
